<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Floor 0 · 50 Archbishop Street</title>
  <meta name="description" content="Floor 0 at 50 Archbishop Street in Valletta." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://50archbishop.com/0/" />
  <meta name="theme-color" content="#101010" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23111111'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Arial' font-size='16' fill='white'%3E0%3C/text%3E%3C/svg%3E" />
  <link rel="preload" href="../assets/flat0-01-chaise.jpg" as="image" />
  <style>
    :root { --bg: #101010; --ink: #f2f1ed; --muted: #9a9994; --line: #393939; --pad: clamp(16px, 2.2vw, 34px); }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: var(--bg); font-family: Arial, Helvetica, sans-serif; font-size: 14px; line-height: 1.35; -webkit-font-smoothing: antialiased; }
    img { display: block; width: 100%; }
    a { color: inherit; text-underline-offset: 3px; }
    .header { display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px; padding: 18px var(--pad); border-bottom: 1px solid var(--line); }
    .header .middle { text-align: center; color: var(--muted); }
    .header .right { text-align: right; }
    .header a { text-decoration: none; }
    .main { display: grid; grid-template-columns: minmax(240px, 0.72fr) minmax(0, 1.28fr); min-height: calc(100vh - 55px); }
    .text { display: flex; flex-direction: column; justify-content: space-between; padding: var(--pad); border-right: 1px solid var(--line); }
    h1 { max-width: 7ch; margin: 0; font-size: clamp(4rem, 9vw, 9rem); font-weight: 700; letter-spacing: -0.075em; line-height: 0.82; }
    .description { max-width: 32rem; margin: 80px 0 0; font-size: clamp(1rem, 1.4vw, 1.3rem); line-height: 1.45; }
    .description p { margin: 0 0 1em; }
    .description p:last-child { margin-bottom: 0; color: var(--muted); }
    figure { margin: 0; padding: var(--pad); }
    figure img { height: calc(100vh - 55px - (var(--pad) * 2)); object-fit: cover; }
    figcaption { margin-top: 9px; color: var(--muted); }
    .back { display: grid; grid-template-columns: 1fr 2fr; align-items: center; border-top: 1px solid var(--line); }
    .back p { margin: 0; padding: var(--pad); color: var(--muted); }
    .back a { display: block; padding: var(--pad); border-left: 1px solid var(--line); font-size: clamp(2rem, 6vw, 6rem); font-weight: 700; letter-spacing: -0.06em; line-height: .95; text-decoration: none; }
    .back a:hover { color: var(--bg); background: var(--ink); }
    @media (max-width: 720px) {
      .header { grid-template-columns: 1fr auto; }
      .header .middle { display: none; }
      .main { grid-template-columns: 1fr; min-height: auto; }
      .text { min-height: 55vh; border-right: 0; border-bottom: 1px solid var(--line); }
      h1 { font-size: clamp(5rem, 26vw, 8rem); }
      figure img { height: auto; }
      .back { grid-template-columns: 1fr; }
      .back a { border-left: 0; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="/">← Floor 1</a>
    <span class="middle">50 Archbishop Street</span>
    <span class="right">Floor 0</span>
  </header>

  <main class="main">
    <div class="text">
      <h1>Floor 0</h1>
      <div class="description">
        <p>This is the lower floor of the house.</p>
        <p>The staircase leading down to it is dated 1647. There is only one photograph here for now.</p>
      </div>
    </div>
    <figure>
      <img src="../assets/flat0-01-chaise.jpg" alt="A chaise beside the courtyard door on Floor 0" />
      <figcaption>The chaise beside the courtyard door. Photograph by Fiona.</figcaption>
    </figure>
  </main>

  <nav class="back">
    <p>Upstairs</p>
    <a href="/">Return to Floor 1 →</a>
  </nav>
</body>
</html>
